<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAgent — AI-Powered Code Editor</title>
  <meta name="description" content="Futuristic real-time code editor with AI agent chat, live preview, and multi-model support powered by Groq." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Top Navigation Bar -->
  <header id="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="url(#bolt-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="bolt-grad" x1="3" y1="2" x2="21" y2="22">
                <stop stop-color="#00f0ff"/>
                <stop offset="1" stop-color="#b400ff"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">Code<span class="accent">Agent</span></span>
      </div>
      <div class="file-tabs" id="fileTabs">
        <button class="file-tab active" data-lang="html">
          <span class="tab-icon html-icon">◇</span>
          index.html
        </button>
        <button class="file-tab" data-lang="css">
          <span class="tab-icon css-icon">◆</span>
          style.css
        </button>
        <button class="file-tab" data-lang="javascript">
          <span class="tab-icon js-icon">⬡</span>
          script.js
        </button>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>
      <button class="topbar-btn mobile-only" id="mobileLayoutToggleBtn" title="Toggle Layout (Stacked / Tabbed)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="7" rx="1"/>
          <rect x="3" y="14" width="18" height="7" rx="1"/>
        </svg>
      </button>
      <button class="topbar-btn" id="settingsBtn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Mobile Bottom Navigation -->
  <nav id="mobileBottomNav">
    <button class="mobile-nav-btn active" data-mobtab="chat">
      <span class="mob-icon">💬</span>
      Chat
    </button>
    <button class="mobile-nav-btn" data-mobtab="code">
      <span class="mob-icon">💻</span>
      Code
    </button>
    <button class="mobile-nav-btn" data-mobtab="preview">
      <span class="mob-icon">👁️</span>
      Preview
    </button>
  </nav>

  <!-- Main Layout -->
  <main id="mainLayout">
    <!-- Left Panel: Editor + Preview -->
    <section id="editorPanel" class="panel">
      <!-- Editor Toolbar -->
      <div class="panel-toolbar">
        <div class="view-tabs">
          <button class="view-tab active" data-view="editor" id="viewEditor">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Code
          </button>
          <button class="view-tab" data-view="preview" id="viewPreview">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Preview
          </button>
          <button class="view-tab" data-view="split" id="viewSplit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
            Split
          </button>
        </div>
        <div class="toolbar-actions">
          <button class="action-btn" id="runCodeBtn" title="Run Code">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Run
          </button>
          <button class="action-btn" id="copyCodeBtn" title="Copy Code">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="action-btn" id="downloadBtn" title="Download">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </div>

      <!-- Editor Container -->
      <div class="editor-content">
        <div id="editorContainer" class="editor-view active"></div>
        <div id="previewContainer" class="preview-view">
          <iframe id="previewFrame" sandbox="allow-scripts allow-modals allow-same-origin" title="Live Preview"></iframe>
        </div>
      </div>
    </section>

    <!-- Resizer -->
    <div id="panelResizer" class="resizer"></div>

    <!-- Right Panel: Chat -->
    <section id="chatPanel" class="panel">
      <div class="panel-toolbar chat-toolbar">
        <div class="chat-header-left">
          <h2 class="chat-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="url(#chat-grad)" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              <defs>
                <linearGradient id="chat-grad" x1="3" y1="3" x2="21" y2="21">
                  <stop stop-color="#00f0ff"/>
                  <stop offset="1" stop-color="#b400ff"/>
                </linearGradient>
              </defs>
            </svg>
            AI Agent
          </h2>
        </div>
        <div class="chat-header-right">
          <div class="mode-toggle" id="modeToggle">
            <button class="mode-btn active" data-mode="agent" title="Agent mode - AI writes and edits code">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a5 5 0 0 1 5 5v3a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5z"/><path d="M1 20a11 11 0 0 1 22 0"/></svg>
              Agent
            </button>
            <button class="mode-btn" data-mode="chat" title="Chat mode - Ask questions">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              Chat
            </button>
          </div>
          <button class="action-btn" id="clearChatBtn" title="Clear Chat">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>

      <!-- Model Selector -->
      <div class="model-selector" id="modelSelector">
        <button class="model-select-btn" id="modelSelectBtn">
          <span class="model-icon">⚡</span>
          <span class="model-name" id="currentModelName">LLaMA 3.3 70B</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="model-dropdown" id="modelDropdown">
          <div class="dropdown-header">Select Model</div>
          <div class="model-list" id="modelList">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- Chat Messages -->
      <div class="chat-messages" id="chatMessages">
        <div class="welcome-message">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="url(#welcome-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <defs>
                <linearGradient id="welcome-grad" x1="3" y1="2" x2="21" y2="22">
                  <stop stop-color="#00f0ff"/>
                  <stop offset="1" stop-color="#b400ff"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h3>Welcome to CodeAgent</h3>
          <p>I can help you write, debug, and improve code in real-time. Try asking me to:</p>
          <div class="quick-actions">
            <button class="quick-action-btn" data-prompt="Create a beautiful landing page with animated gradients and modern design">
              <span>✨</span> Create a landing page
            </button>
            <button class="quick-action-btn" data-prompt="Build a todo app with local storage, animations, and a sleek dark theme">
              <span>📋</span> Build a todo app
            </button>
            <button class="quick-action-btn" data-prompt="Create an interactive animated particle background using canvas">
              <span>🎨</span> Particle animation
            </button>
            <button class="quick-action-btn" data-prompt="Build a real-time clock with analog and digital display, dark theme">
              <span>⏰</span> Animated clock
            </button>
          </div>
        </div>
      </div>

      <!-- Chat Input -->
      <div class="chat-input-area">
        <div class="input-wrapper">
          <textarea id="chatInput" placeholder="Ask CodeAgent to write or edit code..." rows="1"></textarea>
          <button id="sendBtn" class="send-btn" title="Send Message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="footer-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</span>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
